# Default values for update-cloudflare.

replicaCount: 1
nameOverride: ""
fullnameOverride: ""
hostNetwork: false

image:
  repository: ghcr.io/jpflouret/update-cloudflare
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []

# Host name to update
dnsName: ""

# TTL for the DNS record (1 = Cloudflare Auto TTL)
dnsTTL: "1"

# Cloudflare zone ID
zoneId: ""

# URL to check the public IP address
checkIPURL: ""

# Period to check the public IP address
sleepPeriod: ""

secret:
  create: false
  # Cloudflare API token
  cfApiToken: ""
  # Secret should contain the following key:
  # - CF_API_TOKEN
  existingSecret: ""

service:
  create: false
  type: ClusterIP
  port: 8080
  annotations: {}
    # prometheus.io/scrape: "true"
    # prometheus.io/path: /metrics
    # prometheus.io/port: "8080"

serviceMonitor:
  enabled: false
  # Additional labels for the ServiceMonitor
  labels: {}
  # Annotations for the ServiceMonitor
  annotations: {}
  # Scrape interval (e.g. "30s")
  interval: ""
  # Scrape timeout (e.g. "10s")
  scrapeTimeout: ""
  # Metrics path
  path: /metrics
  # Metric relabelings
  metricRelabelings: []
  # Relabelings
  relabelings: []
  # Namespace selector
  namespaceSelector: {}

serviceAccount:
  create: false
  name: ""
  automount: true
  annotations: {}

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: metrics
readinessProbe:
  httpGet:
    path: /healthz
    port: metrics

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  # capabilities:
  #   drop:
  #   - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001

annotations: {}

nodeSelector: {}

tolerations: []

affinity: {}

extraArgs: {}
extraEnv: []
extraEnvFrom: []
extraContainers: []
extraVolumeMounts: []
extraVolumes: []
extraInitContainers: []
