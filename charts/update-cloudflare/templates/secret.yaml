{{- if .Values.secret.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "update-cloudflare.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "update-cloudflare.name" . }}
    helm.sh/chart: {{ include "update-cloudflare.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
data:
{{- if .Values.secret.cfApiToken }}
  CF_API_TOKEN: {{ .Values.secret.cfApiToken | b64enc | quote }}
{{- end }}
{{- end -}}
